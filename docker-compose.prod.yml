# docker-compose.prod.yml
# Production environment for the OVEERMOON landing.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Expects nginx on the host to reverse-proxy the OVEERMOON domain → 127.0.0.1:8030.
# Telegram secrets are read at runtime from .env.local (gitignored — must exist
# on the server next to this file; see DEPLOY.md).

name: oveermoon-landing-prod

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: oveermoon-landing:prod
    container_name: oveermoon-landing-prod
    restart: always
    ports:
      - "127.0.0.1:8030:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - oveermoon-landing-network-prod
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

networks:
  oveermoon-landing-network-prod:
    driver: bridge
    name: oveermoon-landing-network-prod
